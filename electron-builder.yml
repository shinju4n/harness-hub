appId: com.harnesshub.app
productName: Harness Hub
directories:
  output: dist-electron
asar: true
asarUnpack:
  - "server.js"
  - "node_modules/**/*"
  - ".next/**/*"
  - "public/**/*"
files:
  - "electron/**/*"
  - "server.js"
  - ".next/standalone/node_modules/**/*"
  - ".next/standalone/.next/**/*"
  - ".next/static/**/*"
  - "public/**/*"
  - "package.json"
extraResources:
  - from: ".next/standalone/"
    to: "app.asar.unpacked/"
    filter:
      - "**/*"
  - from: ".next/static/"
    to: "app.asar.unpacked/.next/static/"
    filter:
      - "**/*"
  - from: "public/"
    to: "app.asar.unpacked/public/"
    filter:
      - "**/*"
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    # zip target is required by electron-updater on macOS
    - target: zip
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  # Notarization requires Apple Developer credentials (APPLE_ID,
  # APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID). electron-builder auto-skips
  # with a warning when these are missing, so local dmg builds still succeed
  # — they just ship unsigned, unnotarized, and are only useful for testing.
  notarize: true
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: shinju4n
  repo: harness-hub
