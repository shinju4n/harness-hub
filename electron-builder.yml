appId: com.harnesshub.app
productName: Harness Hub
directories:
  output: dist-electron
asar: true
# LZMA compression — saves 20-40% on installer size at the cost of ~30s extra
# build time and slightly slower first launch on the user's machine.
compression: maximum
asarUnpack:
  - "server.js"
  - "node_modules/**/*"
  - ".next/**/*"
  - "public/**/*"
files:
  - "electron/**/*"
  - "server.js"
  - ".next/standalone/node_modules/**/*"
  - ".next/standalone/.next/**/*"
  - ".next/static/**/*"
  - "public/**/*"
  - "package.json"
  # Exclude noise that would otherwise inflate the bundle.
  - "!**/*.map"
  - "!**/*.md"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/__tests__/**"
  - "!**/*.test.*"
  - "!**/*.spec.*"
  - "!**/.bin/**"
  - "!**/LICENSE*"
  - "!**/CHANGELOG*"
extraResources:
  - from: ".next/standalone/"
    to: "app.asar.unpacked/"
    filter:
      - "**/*"
  - from: ".next/static/"
    to: "app.asar.unpacked/.next/static/"
    filter:
      - "**/*"
  - from: "public/"
    to: "app.asar.unpacked/public/"
    filter:
      - "**/*"
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    # zip target is required by electron-updater on macOS
    - target: zip
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  # Notarization requires Apple Developer credentials (APPLE_ID,
  # APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID). electron-builder auto-skips
  # with a warning when these are missing, so local dmg builds still succeed
  # — they just ship unsigned, unnotarized, and are only useful for testing.
  notarize: true
  # Ship only English + Korean. Electron defaults to ~50 Chromium locale
  # files (~10MB combined). Other languages affect only menu/dialog strings.
  electronLanguages:
    - en
    - ko
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  electronLanguages:
    - en
    - ko
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: shinju4n
  repo: harness-hub
