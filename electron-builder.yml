appId: com.harnesshub.app
productName: Harness Hub
directories:
  output: dist-electron
files:
  - "electron/**/*"
  - ".next/**/*"
  - "public/**/*"
  - "node_modules/**/*"
  - "package.json"
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
