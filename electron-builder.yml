appId: com.harnesshub.app
productName: Harness Hub
directories:
  output: dist-electron
asar: true
asarUnpack:
  - "server.js"
  - "node_modules/**/*"
  - ".next/**/*"
  - "public/**/*"
files:
  - "electron/**/*"
  - "server.js"
  - ".next/standalone/node_modules/**/*"
  - ".next/standalone/.next/**/*"
  - ".next/static/**/*"
  - "public/**/*"
  - "package.json"
extraResources:
  - from: ".next/standalone/"
    to: "app.asar.unpacked/"
    filter:
      - "**/*"
  - from: ".next/static/"
    to: "app.asar.unpacked/.next/static/"
    filter:
      - "**/*"
  - from: "public/"
    to: "app.asar.unpacked/public/"
    filter:
      - "**/*"
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  identity: null
  icon: build/icon.icns
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
